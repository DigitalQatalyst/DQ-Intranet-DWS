name: 🚀 Deploy to Vercel (Prod + Preview)

on:
  push:
    branches:
      - main
      - "feature/**"
      - develop
      - "fix/**"
      - "hotfix/**"
      - "develop-staging"
      - "staging"
      - "release"
      - "feat/**"
      - "Stage**"
      - "samuel-knowledge-center"
      - "**-knowledge-center"
      - "**-knowledge-**"
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📊 Extract commit info
        id: commit_info
        env:
          AUTHOR_NAME: ${{ github.event.head_commit.author.name }}
          AUTHOR_EMAIL: ${{ github.event.head_commit.author.email }}
        run: |
          echo "author_name=$AUTHOR_NAME" >> $GITHUB_OUTPUT
          echo "author_email=$AUTHOR_EMAIL" >> $GITHUB_OUTPUT
          echo "🔍 Commit by: $AUTHOR_NAME ($AUTHOR_EMAIL)"

      - name: 🧰 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: ⚙️ Install Vercel CLI
        run: npm install -g vercel@latest

      # CRITICAL: Create .vercel directory with project linking BEFORE pulling
      - name: 🔧 Link to Vercel Project
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          mkdir -p .vercel
          echo "{\"projectId\":\"$VERCEL_PROJECT_ID\",\"orgId\":\"$VERCEL_ORG_ID\"}" > .vercel/project.json
          cat .vercel/project.json
          echo "✅ Linked to Vercel project: dq-intranet"

      - name: 🔗 Pull Vercel environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: 🏗️ Build with Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            vercel build --prod --token=$VERCEL_TOKEN
          else
            vercel build --token=$VERCEL_TOKEN
          fi

      - name: 🌐 Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BRANCH_NAME: ${{ github.ref_name }}
          AUTHOR_NAME: ${{ steps.commit_info.outputs.author_name }}
          AUTHOR_EMAIL: ${{ steps.commit_info.outputs.author_email }}
        run: |
          echo "🔍 Branch: $BRANCH_NAME"
          echo "👤 Deployed by: $AUTHOR_NAME ($AUTHOR_EMAIL)"
          echo "📦 Project ID: $VERCEL_PROJECT_ID"

          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "🚀 Deploying PRODUCTION build..."
            DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
            echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
            echo "✅ Production deployed at: $DEPLOY_URL"
          else
            echo "🧪 Deploying PREVIEW build for branch: $BRANCH_NAME"
            DEPLOY_URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
            echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
            echo "✅ Preview deployed at: $DEPLOY_URL"
          fi

      - name: 💬 Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
          AUTHOR_NAME: ${{ steps.commit_info.outputs.author_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deployUrl = process.env.DEPLOY_URL;
            const author = process.env.AUTHOR_NAME;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview Deployment Ready!**\n\n✨ Deployed by: **${author}**\n🔗 Preview URL: ${deployUrl}\n\n_Deployment triggered by commit ${context.sha.substring(0, 7)}_`
            });

      - name: 📝 Deployment summary
        env:
          AUTHOR_NAME: ${{ steps.commit_info.outputs.author_name }}
          AUTHOR_EMAIL: ${{ steps.commit_info.outputs.author_email }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
        run: |
          echo "## 🎉 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`$GITHUB_REF_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** $AUTHOR_NAME ($AUTHOR_EMAIL)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`$GITHUB_SHA\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $DEPLOY_URL" >> $GITHUB_STEP_SUMMARY
